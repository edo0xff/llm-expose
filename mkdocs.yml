site_name: llm-expose
site_description: Expose LLM assistants through messaging platforms
site_url: https://edo0xff.github.io/llm-expose
repo_url: https://github.com/edo0xff/llm-expose
repo_name: edo0xff/llm-expose
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 edo0xff | MIT License

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/edo0xff/llm-expose
      name: GitHub
  # Analytics configuration (optional)
  # Uncomment and configure for Plausible Analytics or Google Analytics:
  # analytics:
  #   provider: custom  # For Plausible
  #   domain: edo0xff.github.io/llm-expose

extra_css:
  - stylesheets/custom.css

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - toc.integrate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Guides:
      - Channel Configuration: guides/channel-configuration.md
      - Channels and Pairing: guides/channels-and-pairing.md
      - Provider Configuration: guides/provider-configuration.md
      - MCP Integration: guides/mcp-integration.md
      - Deployment: guides/deployment.md
      - FAQ: guides/faq.md
      - Troubleshooting: guides/troubleshooting.md
      - Examples: guides/examples.md
  - Architecture:
      - System Overview: architecture/system-overview.md
  - API:
      - Orchestrator: api/orchestrator.md
      - MCP Runtime: api/mcp-runtime.md
      - Clients:
          - Base Client: api/clients-base.md
          - Telegram Client: api/clients-telegram.md
          - Discord Client: api/clients-discord.md
      - Configuration: api/config.md
      - Providers: api/providers.md
      - Tools: api/tools.md
      - Core: api/core.md
  - Community:
     - Contributing: contributing.md
